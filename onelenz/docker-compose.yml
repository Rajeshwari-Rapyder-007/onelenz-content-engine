services:

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env

  email-connector-api:
    build:
      context: .
      dockerfile: backend/services/email-connector/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1

  email-connector-worker:
    build:
      context: .
      dockerfile: backend/services/email-connector/Dockerfile
    command: celery -A app.workers.celery_app worker --beat --loglevel=info
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1